name: 代理规则与DNS完全覆盖配置
desc: 采用完全覆盖方式替换原有 allow-lan、geox-url、dns、proxy-groups 和 rules
allow-lan: true
geox-url:
  geoip: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat'
  geosite: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat'
  mmdb: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb'
  asn: 'https://raw.githubusercontent.com/xishang0128/geoip/release/GeoLite2-ASN.mmdb'
dns:
  enable: true
  listen: ':53'
  enhanced-mode: 'fake-ip'
  fake-ip-range: '198.18.0.1/16'
  use-hosts: false
  use-system-hosts: true
  ipv6: false
  fake-ip-filter: #!replace
    - '*.lan'
    - '*.local'
    - '*.arpa'
    - 'time.*.com'
    - 'ntp.*.com'
    - '+.market.xiaomi.com'
    - 'localhost.ptlogin2.qq.com'
    - '*.msftncsi.com'
    - 'www.msftconnecttest.com'
    - '*.bilibili.com'
    - '*.bilivideo.com'
    - '*.bilivideo.cn'
    - '*.bilivideo.net'
    - '*.hdslb.com'
    - '*.biliapi.net'
    - '*.biliapi.com'
    - '*.mcdn.bilivideo.cn'
  default-nameserver: #!replace
    - 'system'
    - '223.5.5.5'
    - '119.29.29.29'
    - '2400:3200::1'
    - '2001:4860:4860::8888'
  
  # 【修改点 1】: 将国内 DNS 作为主力解析（Stash 官方推荐做法）
  nameserver: #!replace
    - 'https://dns.alidns.com/dns-query'
    - 'https://doh.pub/dns-query'
  
  # 【修改点 2】: 将国外防污染 DNS 放入 fallback
  fallback: #!replace
    - 'https://1.1.1.1/dns-query'
    - 'https://8.8.8.8/dns-query'
  
  fallback-filter:
    geoip: true # 【修改点 3】: 开启 GeoIP 过滤，确保国内外 DNS 精准分流
    geoip-code: 'CN'
    ipcidr:
      - '240.0.0.0/4'
      - '0.0.0.0/32'
    domain:
      - '+.google.com'
      - '+.facebook.com'
      - '+.youtube.com'

proxy-groups: #!replace
  # 1. 主节点选择：默认代理开关
  # include-all: true 会把所有机场节点自动加进来
# 1. 主代理选择
  - name: 🚀 代理选择
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇺🇸 美国节点
      - 🇸🇬 狮城节点
      - 🇰🇷 韩国节点
      - 🇯🇵 日本节点
      - 🇨🇳 回国节点
    include-all: true

  # AIGC：去除了 include-all 和正则，直接引入符合 AI 要求的地区组
  - name: 🤖 AIGC
    type: select
    proxies:
      - 🇹🇼 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🚀 代理选择  # 默认跟随主节点
      - DIRECT      # 偶尔需要直连测试时用
    include-all: true

  # 2. 流媒体：给了所有节点选择权，默认置顶 DIRECT (直连)
  - name: 📺 哔哩哔哩
    type: select
    proxies:
      - DIRECT
      - 🚀 代理选择
      - 🇨🇳 回国节点
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇺🇸 美国节点
      - 🇸🇬 狮城节点
      - 🇰🇷 韩国节点
      - 🇯🇵 日本节点
    include-all: true

  - name: 📦 小黑盒
    type: select
    proxies:
      - DIRECT
      - 🚀 代理选择
      - 🇨🇳 回国节点
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇺🇸 美国节点
      - 🇸🇬 狮城节点
