name: 代理规则与DNS完全覆盖配置
desc: 采用完全覆盖方式替换原有 allow-lan、geox-url、dns、proxy-groups 和 rules

allow-lan: true

geox-url: #!replace
  geoip: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat'
  geosite: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat'
  mmdb: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb'
  asn: 'https://raw.githubusercontent.com/xishang0128/geoip/release/GeoLite2-ASN.mmdb'

dns: #!replace
  enable: true
  listen: ':53'
  enhanced-mode: 'fake-ip'
  fake-ip-range: '198.18.0.1/16'
  fake-ip-filter-mode: 'blacklist'
  prefer-h3: true
  respect-rules: true
  use-hosts: false
  use-system-hosts: true
  ipv6: false
  fake-ip-filter:
  - '*.lan'
  - '*.local'
  - '*.arpa'
  - 'time.*.com'
  - 'ntp.*.com'
  - '+.market.xiaomi.com'
  - 'localhost.ptlogin2.qq.com'
  - '*.msftncsi.com'
  - 'www.msftconnecttest.com'
  - '*.bilibili.com'
  - '*.bilivideo.com'
  - '*.bilivideo.cn'
  - '*.bilivideo.net'
  - '*.hdslb.com'
  - '*.biliapi.net'
  - '*.biliapi.com'
  - '*.mcdn.bilivideo.cn'
  - 'pemby.ednovas.org'
  default-nameserver:
  - 'system'
  - '223.5.5.5'
  - '119.29.29.29'
  - '2400:3200::1'
  - '2001:4860:4860::8888'
  nameserver:
  - 'https://1.1.1.1/dns-query'
  - 'https://8.8.8.8/dns-query'
  direct-nameserver-follow-policy: false
  fallback-filter:
    geoip: false
    geoip-code: 'CN'
    ipcidr:
    - '240.0.0.0/4'
    - '0.0.0.0/32'
    domain:
    - '+.google.com'
    - '+.facebook.com'
    - '+.youtube.com'
  fallback: []
  proxy-server-nameserver:
  - 'https://doh.pub/dns-query'
  - 'https://dns.alidns.com/dns-query'
  - 'https://1.1.1.1/dns-query'
  - 'tls://223.5.5.5'
  direct-nameserver: []
  # 【重要修复】此处必须是字符串，不能是数组
  nameserver-policy:
    "geosite:cn": "https://dns.alidns.com/dns-query"


